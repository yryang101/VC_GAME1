<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>햄찌 출근길 장애물 피하기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <section class="title-panel">
      <p class="eyebrow">PIXEL COMMUTE RUNNER</p>
      <h1>햄찌 출근길</h1>
      <p class="subtitle">스페이스 / 클릭 / 모바일 터치로 점프해서 3분 동안 장애물을 피하세요.</p>
    </section>

    <section class="status-panel" aria-label="게임 상태">
      <div class="status-card">
        <span>남은 시간</span>
        <strong id="timeText">03:00</strong>
      </div>
      <div class="status-card">
        <span>컨디션</span>
        <strong id="lifeText">❤❤❤</strong>
      </div>
      <div class="status-card">
        <span>현재 단계</span>
        <strong id="stageText">1단계</strong>
      </div>
    </section>

    <section class="stage" id="stage" aria-label="게임 화면">
      <div class="skyline"></div>
      <div class="cloud cloud-one"></div>
      <div class="cloud cloud-two"></div>
      <div class="pixel-office">OFFICE</div>
      <div class="progress-track"><div id="progressFill"></div></div>
      <div class="stage-banner" id="stageBanner">1단계 · 동네 골목</div>

      <div class="road-lane">
        <div class="dash-line"></div>
      </div>

      <div class="hamster-wrap" id="hamsterWrap">
        <div class="hamster shadow"></div>
        <div class="hamster">
          <div class="ear left"></div>
          <div class="ear right"></div>
          <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="nose"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
          </div>
          <div class="shirt"></div>
          <div class="tie"></div>
          <div class="phone"></div>
          <div class="coffee-cup"></div>
        </div>
      </div>

      <div id="obstacleLayer"></div>
      <div class="hit-flash" id="hitFlash"></div>
      <div class="center-message" id="centerMessage">
        <h2>햄찌 출근 준비 완료!</h2>
        <p>장애물이 오면 한 번 눌러 점프하세요.</p>
        <button id="startButton">출근 시작</button>
      </div>
    </section>

    <section class="guide-panel">
      <div>
        <strong>핵심 메커닉</strong>
        <p>타이밍 점프</p>
      </div>
      <div>
        <strong>승패 조건</strong>
        <p>3분 생존</p>
      </div>
      <div>
        <strong>조작 방식</strong>
        <p>스페이스 / 클릭 / 터치</p>
      </div>
    </section>

    <section class="log-panel">
      <h3>출근 로그</h3>
      <ul id="logList">
        <li>햄찌가 커피와 휴대폰을 챙겼습니다.</li>
      </ul>
    </section>

    <section class="result-panel hidden" id="resultPanel">
      <div class="result-card">
        <p class="eyebrow">ENDING</p>
        <h2 id="endingTitle"></h2>
        <p id="endingText"></p>
        <button id="restartButton">다시 출근하기</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
